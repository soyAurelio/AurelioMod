# Woodpecker CI Pipeline — AurelioMod Engine
# Sequential stages: lint → test(-race) → security → sbom → build
# Each stage blocks the next on failure. All must pass for green pipeline.

clone:
  git:
    image: woodpeckerci/plugin-git

pipeline:
  # Stage 1: Lint — golangci-lint v2.2
  lint:
    image: golangci/golangci-lint:v2.2-alpine
    group: verify
    commands:
      - golangci-lint run --timeout 5m ./...

  # Stage 2: Test — go test with race detector
  test:
    image: golang:1.26-alpine
    group: verify
    depends_on:
      - lint
    commands:
      - go test -race -count=1 -short ./...

  # Stage 3: Security — govulncheck
  security:
    image: golang:1.26-alpine
    group: verify
    depends_on:
      - lint
    commands:
      - go install golang.org/x/vuln/cmd/govulncheck@latest
      - govulncheck ./...

  # Stage 4: SBOM — syft generate
  sbom:
    image: anchore/syft:v1.32.0
    group: verify
    depends_on:
      - lint
    commands:
      - syft dir:. --output spdx-json > sbom.spdx.json

  # Stage 5: Build — verify compilation
  build:
    image: golang:1.26-alpine
    group: build
    depends_on:
      - test
      - security
      - sbom
    commands:
      - CGO_ENABLED=0 go build ./cmd/...

  # Stage 6: Deploy to production (main branch only)
  deploy:
    image: docker:cli
    group: deploy
    depends_on:
      - build
    when:
      branch: main
    environment:
      DOCKER_HOST: tcp://${PROD_VPS_IP}:2376
      DOCKER_TLS_VERIFY: "1"
      DOCKER_CERT_PATH: /certs
    commands:
      - docker compose -f compose.yml -f deployments/production/compose.prod.yml up -d --force-recreate
    secrets:
      - prod_vps_ip
      - prod_ssh_key
