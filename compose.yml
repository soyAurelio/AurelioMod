# AurelioMod — Dev Environment
# Fase 1: MVP — Servidor único con Docker Compose
# Versiones pineadas — Junio 2026

services:
  # === Cache L1/L2 (BLAKE3 + pHash) ===
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.38.1
    container_name: aureliomod-dragonfly
    restart: unless-stopped
    ports:
      - "6380:6379"
    command:
      - "--cache_mode=true"
      - "--maxmemory=4gb"
      - "--dbnum=1"
      - "--minloglevel=2"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      retries: 3
    volumes:
      - dragonfly_data:/data

  # === Message Queue (async Edge ↔ Engine) ===
  nats:
    image: nats:2.14.2-alpine
    container_name: aureliomod-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    command:
      - "--config=/etc/nats/nats-server.conf"
      - "--jetstream"
      - "--store_dir=/data"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      retries: 5
    volumes:
      - nats_data:/data
      - ./deployments/nats-server.conf:/etc/nats/nats-server.conf:ro

  # === Vector Database (L3 — búsqueda semántica) ===
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.37.7
    container_name: aureliomod-weaviate
    restart: unless-stopped
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8080"
      - "--scheme"
      - "http"
    ports:
      - "8090:8080"
      - "50051:50051"
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: "node1"
      QUERY_DEFAULTS_LIMIT: "25"
      LOG_LEVEL: "info"
      RAFT_BOOTSTRAP_EXPECT: "1"
      CLUSTER_IN_LOCALHOST: "1"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/v1/.well-known/ready",
        ]
      interval: 10s
      retries: 5
    volumes:
      - weaviate_data:/var/lib/weaviate

  # === WebSocket/Real-time (dashboard updates) ===
  centrifugo:
    image: centrifugo/centrifugo:v6.8.1
    container_name: aureliomod-centrifugo
    restart: unless-stopped
    ports:
      - "8000:8000"
    command: -c /centrifugo/config.json
    volumes:
      - ./deployments/centrifugo.json:/centrifugo/config.json:ro
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    depends_on:
      dragonfly:
        condition: service_healthy

  # === Object Storage (dev) ===
  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: aureliomod-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5
    volumes:
      - minio_data:/data

  # === Observabilidad ===
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.144.0
    container_name: aureliomod-vmetrics
    restart: unless-stopped
    ports:
      - "8428:8428"
    command:
      - "--storageDataPath=/storage"
      - "--retentionPeriod=30d"
    volumes:
      - vmetrics_data:/storage

  tempo:
    image: grafana/tempo:2.7.1
    container_name: aureliomod-tempo
    restart: unless-stopped
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    command:
      - "-config.file=/etc/tempo.yaml"
    volumes:
      - ./deployments/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo

  grafana:
    image: grafana/grafana:11.6.0
    container_name: aureliomod-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployments/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro

  # === API Gateway (KrakenD Community Edition) ===
  krakend:
    image: devopsfaith/krakend:2.9.3
    container_name: aureliomod-krakend
    ports:
      - "8080:8080"
    command: run -c /etc/krakend/krakend.json
    volumes:
      - ./deployments/krakend.json:/etc/krakend/krakend.json:ro
    depends_on:
      control:
        condition: service_started
      engine:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/__health",
        ]
      interval: 15s
      timeout: 3s
      retries: 3

  # === Content Analysis Engine (ConnectRPC) ===
  engine:
    build:
      context: .
      dockerfile: deployments/Dockerfile.engine
    container_name: aureliomod-engine
    restart: unless-stopped
    ports:
      - "9090:8080"
    environment:
      WAVESPEED_API_KEY: "${WAVESPEED_API_KEY:-}"
      WAVESPEED_PLAN: "${WAVESPEED_PLAN:-bronze}"
      # WAVESPEED_MAX_CONCURRENT overrides WAVESPEED_PLAN if set
      DRAGONFLY_ADDR: "dragonfly:6379"
      NATS_URL: "nats://nats:4222"
      NATS_NKEY_SEED: "${NATS_NKEY_SEED}"
      WEAVIATE_ADDR: "http://weaviate:8080"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4317"
      OTEL_INSECURE: "true"
      OTEL_SERVICE_NAME: "engine"
      PORT: "8080"
      MEDIA_SANDBOX_ENABLED: "true"
      WEBRISK_ENABLED: "true"
      WEBRISK_API_KEY: "${WEBRISK_API_KEY:-}"
      NEON_AUDIT_ENABLED: "true"
      NEON_DATABASE_URL: "${NEON_DATABASE_URL}"
      R2_AUDIT_ENABLED: "true"
      R2_ENDPOINT: "http://minio:9000"
      R2_ACCESS_KEY_ID: "minioadmin"
      R2_SECRET_ACCESS_KEY: "minioadmin"
      R2_BUCKET: "aureliomod-audit"
      R2_REGION: "us-east-1"
      YTDLP_SIDECAR_URL: "http://ytdlp-sidecar:8080"
    depends_on:
      dragonfly:
        condition: service_healthy
      nats:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      minio:
        condition: service_healthy

  # === yt-dlp Sidecar (sandboxed HTTP wrapper) ===
  ytdlp-sidecar:
    build:
      context: .
      dockerfile: deployments/Dockerfile.ytdlp-sidecar
    container_name: aureliomod-ytdlp-sidecar
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      YTDLP_SIDECAR_ENABLED: "true"
      YTDLP_SIDECAR_PORT: "8080"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/healthz",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # === Control API (Fiber v3 REST) ===
  control:
    build:
      context: .
      dockerfile: deployments/Dockerfile.control
    container_name: aureliomod-control
    ports:
      - "8082:8080"
    environment:
      PORT: "8080"
      NEON_DATABASE_URL: "${NEON_DATABASE_URL}"
      PASETO_SECRET_KEY: "${PASETO_SECRET_KEY:-}"
      PASETO_PREVIOUS_KEY: "${PASETO_PREVIOUS_KEY:-}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      STRIPE_PRICE_BRONZE: "${STRIPE_PRICE_BRONZE:-}"
      STRIPE_PRICE_SILVER: "${STRIPE_PRICE_SILVER:-}"
      STRIPE_PRICE_GOLD: "${STRIPE_PRICE_GOLD:-}"
      CONTROL_BASE_URL: "${CONTROL_BASE_URL:-http://localhost:8082}"
    restart: unless-stopped

  # === Edge Service: Discord Bot (ConnectRPC client) ===
  edge-discord:
    build:
      context: .
      dockerfile: deployments/Dockerfile.edge-discord
    container_name: aureliomod-edge-discord
    environment:
      DISCORD_TOKEN: "${DISCORD_TOKEN:-}"
      ENGINE_URL: "http://engine:8080"
      CONTROL_URL: "${CONTROL_URL:-http://control:8080}"
      CONTROL_TOKEN: "${CONTROL_TOKEN:-}"
      PASETO_SECRET_KEY: "${PASETO_SECRET_KEY:-}"
      REQUIRED_GUILD_ID: "${REQUIRED_GUILD_ID:-}"
      ENFORCE_MODERATION: "${ENFORCE_MODERATION:-true}"
      BOT_LANG: "${BOT_LANG:-es}"
    depends_on:
      engine:
        condition: service_healthy
    restart: unless-stopped

volumes:
  dragonfly_data:
  nats_data:
  weaviate_data:
  minio_data:
  vmetrics_data:
  tempo_data:
  grafana_data:
