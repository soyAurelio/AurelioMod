# AurelioMod — Producción (Fase 1: single VPS)
# Extiende compose.yml con hardening de seguridad.
#
# Uso:
#   docker compose -f compose.yml -f deployments/production/compose.prod.yml up -d
#
# Requisitos previos:
#   - Caddy como reverse proxy (ver Caddyfile)
#   - .env con todas las variables de producción

services:
  # === Reverse Proxy (SSL + rate limiting) ===
  caddy:
    image: caddy:2.9-alpine
    container_name: aureliomod-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deployments/production/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - default

  # === Production overrides for infrastructure services ===
  ytdlp-sidecar:
    ports: []
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512m }
        reservations: { cpus: "0.25", memory: 128m }
    restart: unless-stopped

  # Engine: point of contact with untrusted content (FFmpeg, media parsing).
  # Defense hierarchy (single source of truth per layer):
  #   1. Docker hardening → protects the Go runtime (read_only, cap_drop, no-new-privileges)
  #   2. nsjail          → source of truth for FFmpeg sandboxing (seccomp, namespaces, rlimits)
  #   3. Sidecar         → yt-dlp isolation (separate container)
  #   4. App-level       → MIME validation, body limits, WebRisk URL check
  # NOTE: no Docker seccomp profile — nsjail already enforces seccomp internally.
  #       Dual seccomp (Docker + nsjail) causes non-deterministic failures and debugging hell.
  engine:
    ports: []
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:exec,size=256M
    deploy:
      resources:
        limits: { cpus: "3.0", memory: 2g }
        reservations: { cpus: "1.0", memory: 512m }

  control:
    ports: []
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256m }

  edge-discord:
    ports: []
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256m }

  krakend:
    ports: []
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 128m }

  dragonfly:
    ports: []
    deploy:
      resources:
        limits: { cpus: "2.0", memory: 4g }
        reservations: { cpus: "0.5", memory: 1g }
  nats:
    ports: []
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1g }
        reservations: { cpus: "0.25", memory: 256m }
  weaviate:
    ports: []
    deploy:
      resources:
        limits: { cpus: "1.5", memory: 2g }
        reservations: { cpus: "0.5", memory: 512m }
  minio:
    ports: []
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1g }
  victoriametrics:
    ports: []
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1g }
  tempo:
    ports: []
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1g }
  centrifugo:
    volumes:
      - ./deployments/centrifugo.prod.json:/centrifugo/config.json:ro
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256m }
  grafana:
    ports: []
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256m }

volumes:
  caddy_data:
  caddy_config:
