# AurelioMod NATS Server — nkey authentication
# Replaces --user/--pass plaintext credentials.
#
# Usage:
#   nats-server -c /etc/nats/nats-server.conf
#
# Generate fresh nkeys with:
#   nsc generate nkey --user
#   (outputs: seed / public — seed goes to .env, public goes here)

jetstream {
  store_dir: "/data"
}

http_port: 8222

authorization {
  users [
    {
      # aureliomod service user — scoped to JetStream publish/subscribe
      nkey: UBF6JUFCTG4BFKF7D2CI3KEFKLN2FKZTJNQ5UZHAYLYCC6N4T4DQRS25
      permissions: {
        publish: {
          allow: ["engine.>", "edge.>", "analysis.>"]
        }
        subscribe: {
          allow: ["engine.>", "edge.>", "analysis.>"]
        }
      }
    }
  ]
}
